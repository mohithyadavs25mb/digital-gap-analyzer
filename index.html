<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightnodes | B2B Reconnaissance</title>
    <style>
        /* Professional Dark Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #050b14; 
            color: #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 15px; 
            margin: 0; 
            background-image: radial-gradient(circle at top, #0f1c33 0%, #050b14 70%);
            min-height: 100vh;
        }
        .container { 
            background: rgba(13, 22, 38, 0.6); 
            padding: 40px; 
            border-radius: 16px; 
            border: 1px solid #1e3a8a;
            box-shadow: 0 8px 32px rgba(0, 195, 255, 0.1); 
            max-width: 800px; 
            width: 100%; 
            backdrop-filter: blur(12px);
            text-align: center;
        }
        h1 { 
            color: #38bdf8; 
            margin-bottom: 5px; 
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        p.subtitle { color: #94a3b8; margin-bottom: 35px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;}
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            justify-content: center;
        }
        input[type="url"] { 
            flex: 1;
            padding: 16px; 
            background-color: #020617;
            color: #e2e8f0;
            border: 1px solid #334155; 
            border-radius: 8px; 
            font-size: 16px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        input[type="url"]:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 12px rgba(56, 189, 248, 0.3); }
        
        button { 
            background-color: #0ea5e9; 
            color: white; 
            border: none; 
            padding: 0 35px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: all 0.3s ease; 
        }
        button:hover { background-color: #0284c7; box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
        
        /* 2-Column Grid for Results */
        #resultsBox { 
            margin-top: 40px; 
            display: none; 
            text-align: left;
        }
        .report-header {
            color: #38bdf8;
            border-bottom: 1px solid #1e40af;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .result-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
        }
        .card-label { color: #cbd5e1; }
        
        /* Professional Status Colors */
        .pass { color: #10b981; font-weight: 600; }
        .fail { color: #ef4444; font-weight: 600; }
        .neutral { color: #f59e0b; font-weight: 600; }
        
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Digital Gap Analyzer</h1>
        <p class="subtitle">Brightnodes Intelligence Terminal</p>
        
        <div class="search-box">
            <input type="url" id="websiteUrl" placeholder="Target URL: https://example.com" required>
            <button onclick="scanWebsite()" id="scanBtn">INITIALIZE</button>
        </div>

        <div id="resultsBox">
            <div class="report-header">
                <span>System Scan Complete</span>
                <span id="res-time" class="neutral"></span>
            </div>
            
            <div class="grid-container">
                <div class="result-card"><span class="card-label">🔒 SSL Encryption</span> <span id="res-ssl"></span></div>
                <div class="result-card"><span class="card-label">📱 Mobile Responsive</span> <span id="res-mobile"></span></div>
                <div class="result-card"><span class="card-label">🔍 SEO Meta Tags</span> <span id="res-seo"></span></div>
                <div class="result-card"><span class="card-label">🌐 Social Media Links</span> <span id="res-socials"></span></div>
                <div class="result-card"><span class="card-label">📧 Direct Email Link</span> <span id="res-email"></span></div>
                
                <div class="result-card"><span class="card-label">📊 Business Intelligence</span> <span id="res-intel"></span></div>
                <div class="result-card"><span class="card-label">⚙️ Legacy CMS (WordPress)</span> <span id="res-wp"></span></div>
                <div class="result-card"><span class="card-label">🤖 Sales Automation (CRM)</span> <span id="res-auto"></span></div>
                <div class="result-card"><span class="card-label">📲 Dedicated Mobile App</span> <span id="res-app"></span></div>
            </div>
        </div>
    </div>

    <script>
        async function scanWebsite() {
            const urlInput = document.getElementById('websiteUrl').value;
            const btn = document.getElementById('scanBtn');
            const resultsBox = document.getElementById('resultsBox');
            
            if(!urlInput) { alert("Please input a valid URL."); return; }
            
            btn.innerText = "SCANNING...";
            btn.style.backgroundColor = "#1e40af";
            resultsBox.style.display = "none";

            try {
                const response = await fetch("https://digital-gap-analyzer.onrender.com/scan", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                
                if(data.error) {
                    alert("Scan Error: " + data.error);
                } else {
                    document.getElementById('res-time').innerHTML = "Load Time: " + data.load_time_seconds + "s";
                    
                    document.getElementById('res-ssl').innerHTML = data.ssl_secure ? "<span class='pass'>SECURE</span>" : "<span class='fail'>VULNERABLE</span>";
                    document.getElementById('res-mobile').innerHTML = data.mobile_ready ? "<span class='pass'>OPTIMIZED</span>" : "<span class='fail'>OUTDATED</span>";
                    document.getElementById('res-seo').innerHTML = data.seo_present ? "<span class='pass'>DETECTED</span>" : "<span class='fail'>MISSING</span>";
                    document.getElementById('res-socials').innerHTML = data.has_socials ? "<span class='pass'>CONNECTED</span>" : "<span class='fail'>ISOLATED</span>";
                    document.getElementById('res-email').innerHTML = data.has_contact_email ? "<span class='pass'>PRESENT</span>" : "<span class='fail'>MISSING</span>";
                    
                    document.getElementById('res-intel').innerHTML = data.has_business_intel ? "<span class='pass'>TRACKING</span>" : "<span class='fail'>BLIND</span>";
                    document.getElementById('res-wp').innerHTML = data.is_wordpress ? "<span class='neutral'>DETECTED</span>" : "<span class='pass'>CUSTOM/MODERN</span>";
                    document.getElementById('res-auto').innerHTML = data.has_sales_automation ? "<span class='pass'>INTEGRATED</span>" : "<span class='fail'>MANUAL</span>";
                    document.getElementById('res-app').innerHTML = data.has_mobile_apps ? "<span class='pass'>DEPLOYED</span>" : "<span class='fail'>NONE</span>";
                    
                    resultsBox.style.display = "block";
                }
            } catch(error) {
                alert("Connection failed. Ensure the Render backend is live.");
            }
            
            btn.innerText = "INITIALIZE";
            btn.style.backgroundColor = "#0ea5e9";
        }
    </script>
</body>
</html>
