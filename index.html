<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Gap Analyzer | Brightnodes</title>
    <style>
        /* Modern Corporate SaaS Theme */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            margin: 0; 
            padding: 50px 20px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
            max-width: 800px; 
            width: 100%; 
        }
        h1 { color: #0f172a; font-size: 28px; margin-bottom: 8px; font-weight: 700; }
        p.subtitle { color: #64748b; margin-top: 0; margin-bottom: 30px; font-size: 15px; }
        
        .search-box { display: flex; gap: 12px; margin-bottom: 20px; }
        input[type="url"] { 
            flex: 1; 
            padding: 14px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 16px; 
            color: #0f172a; 
            transition: border-color 0.2s; 
        }
        input[type="url"]:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button { 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        button:hover { background-color: #1d4ed8; }
        
        /* Export Button */
        .btn-export { 
            background-color: #10b981; 
            padding: 10px 16px; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .btn-export:hover { background-color: #059669; }

        #results-section { display: none; margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 30px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-flex h2 { font-size: 20px; color: #0f172a; margin: 0; }
        
        /* Data Grid */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .data-card { 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            padding: 16px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .metric-name { font-weight: 500; color: #475569; font-size: 15px; }
        
        /* Professional Status Badges */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-pass { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .badge-fail { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .badge-neutral { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .badge-info { background-color: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        
        @media (max-width: 600px) { .search-box, .data-grid { flex-direction: column; grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Digital Gap Analyzer</h1>
        <p class="subtitle">B2B Web Infrastructure Audit Tool</p>
        
        <div class="search-box">
            <input type="url" id="websiteUrl" placeholder="Enter company website (e.g., https://example.com)" required>
            <button onclick="scanWebsite()" id="scanBtn">Run Audit</button>
        </div>

        <div id="results-section">
            <div class="header-flex">
                <h2>Audit Results <span id="res-time" style="font-size:14px; color:#64748b; font-weight:normal; margin-left:10px;"></span></h2>
                <button onclick="copyToExcel()" class="btn-export">📋 Copy to Excel</button>
            </div>
            
            <div class="data-grid">
                <div class="data-card"><span class="metric-name">🔒 SSL Encryption</span> <span id="res-ssl"></span></div>
                <div class="data-card"><span class="metric-name">📱 Mobile Responsive</span> <span id="res-mobile"></span></div>
                <div class="data-card"><span class="metric-name">🔍 SEO Meta Tags</span> <span id="res-seo"></span></div>
                <div class="data-card"><span class="metric-name">🌐 Social Media Links</span> <span id="res-socials"></span></div>
                <div class="data-card"><span class="metric-name">📧 Direct Email Link</span> <span id="res-email"></span></div>
                <div class="data-card"><span class="metric-name">📊 Business Intelligence</span> <span id="res-intel"></span></div>
                <div class="data-card"><span class="metric-name">⚙️ Legacy CMS (WordPress)</span> <span id="res-wp"></span></div>
                <div class="data-card"><span class="metric-name">🤖 Sales Automation (CRM)</span> <span id="res-auto"></span></div>
                <div class="data-card"><span class="metric-name">📲 Dedicated Mobile App</span> <span id="res-app"></span></div>
            </div>
        </div>
    </div>

    <script>
        // Store the data globally so the Excel button can use it
        let globalScanData = null;
        let scannedUrl = "";

        async function scanWebsite() {
            const urlInput = document.getElementById('websiteUrl').value;
            const btn = document.getElementById('scanBtn');
            const resultsSection = document.getElementById('results-section');
            
            if(!urlInput) { alert("Please enter a valid URL."); return; }
            
            btn.innerText = "Scanning...";
            btn.style.opacity = "0.7";
            resultsSection.style.display = "none";
            scannedUrl = urlInput;

            try {
                const response = await fetch("https://digital-gap-analyzer.onrender.com/scan", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                
                if(data.error) {
                    alert("Scan Error: " + data.error);
                } else {
                    // Save data for Excel
                    globalScanData = data;
                    
                    document.getElementById('res-time').innerHTML = `(${data.load_time_seconds}s load time)`;
                    
                    // Helper function to assign the clean, corporate badges
                    const formatBadge = (condition, passText, failText, isNeutral = false) => {
                        if (isNeutral) return condition ? `<span class="badge badge-neutral">${passText}</span>` : `<span class="badge badge-info">${failText}</span>`;
                        return condition ? `<span class="badge badge-pass">${passText}</span>` : `<span class="badge badge-fail">${failText}</span>`;
                    };

                    document.getElementById('res-ssl').innerHTML = formatBadge(data.ssl_secure, "Secure", "Vulnerable");
                    document.getElementById('res-mobile').innerHTML = formatBadge(data.mobile_ready, "Optimized", "Outdated");
                    document.getElementById('res-seo').innerHTML = formatBadge(data.seo_present, "Detected", "Missing");
                    document.getElementById('res-socials').innerHTML = formatBadge(data.has_socials, "Connected", "Isolated");
                    document.getElementById('res-email').innerHTML = formatBadge(data.has_contact_email, "Present", "Missing");
                    document.getElementById('res-intel').innerHTML = formatBadge(data.has_business_intel, "Tracking", "Blind");
                    
                    // WordPress is neutral (true = neutral, false = good)
                    document.getElementById('res-wp').innerHTML = formatBadge(data.is_wordpress, "Detected", "Modern/Custom", true);
                    
                    document.getElementById('res-auto').innerHTML = formatBadge(data.has_sales_automation, "Integrated", "Manual");
                    document.getElementById('res-app').innerHTML = formatBadge(data.has_mobile_apps, "Deployed", "None");
                    
                    resultsSection.style.display = "block";
                }
            } catch(error) {
                alert("Connection failed. Ensure the Render backend is live.");
            }
            
            btn.innerText = "Run Audit";
            btn.style.opacity = "1";
        }

        // The Excel Formatting Function
        function copyToExcel() {
            if(!globalScanData) return;
            
            // Format data with Tabs (\t) for Excel columns and Newlines (\n) for rows
            const rows = [
                ["Target URL", scannedUrl],
                ["Load Time (Seconds)", globalScanData.load_time_seconds],
                ["SSL Encryption", globalScanData.ssl_secure ? "Secure" : "Vulnerable"],
                ["Mobile Responsive", globalScanData.mobile_ready ? "Optimized" : "Outdated"],
                ["SEO Meta Tags", globalScanData.seo_present ? "Detected" : "Missing"],
                ["Social Media Links", globalScanData.has_socials ? "Connected" : "Isolated"],
                ["Direct Email Link", globalScanData.has_contact_email ? "Present" : "Missing"],
                ["Business Intelligence", globalScanData.has_business_intel ? "Tracking" : "Blind"],
                ["Legacy CMS (WordPress)", globalScanData.is_wordpress ? "Detected" : "Modern/Custom"],
                ["Sales Automation", globalScanData.has_sales_automation ? "Integrated" : "Manual"],
                ["Dedicated Mobile App", globalScanData.has_mobile_apps ? "Deployed" : "None"]
            ];

            const tsvContent = rows.map(row => row.join("\t")).join("\n");
            
            navigator.clipboard.writeText(tsvContent).then(() => {
                alert("✅ Data copied! Open Excel, click a cell, and press Ctrl+V to paste.");
            }).catch(err => {
                alert("Failed to copy. Please try again.");
            });
        }
    </script>
</body>
</html>
